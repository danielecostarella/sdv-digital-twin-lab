name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check services/ tests/

  unit-tests:
    name: Unit Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway-emulator
          - infotainment-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-timeout httpx
          pip install -r services/${{ matrix.service }}/requirements.txt
      - name: Run unit tests
        run: |
          pytest services/${{ matrix.service }}/tests/ -v

  docker-build:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway-emulator
          - infotainment-dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: |
          docker build services/${{ matrix.service }} \
            -t sdv-${{ matrix.service }}:ci \
            --no-cache
